name: Daily Summary Update

on:
  schedule:
    # 11 PM UTC = 7 AM MYT (UTC+8)
    - cron: '0 23 * * *'
  workflow_dispatch:   # lets you trigger it manually from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get Google OAuth access token
        id: google_token
        run: |
          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.GOOGLE_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")
          ACCESS_TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          echo "GOOGLE_ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Run daily update script
        env:
          NOTION_API_KEY:      ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID:  ${{ secrets.NOTION_DATABASE_ID }}
        run: python3 .github/scripts/daily_update.py

      - name: Commit and push changes
        run: |
          git config user.name  "Daily Bot"
          git config user.email "bot@noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🗓 Daily update: $(date +'%Y-%m-%d')"
          git push
